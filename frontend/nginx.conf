server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (per security dept hardening/nginx-headers.md)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/ { proxy_pass http://backend:3001/api/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    location / { try_files $uri $uri/ /index.html; }
}
