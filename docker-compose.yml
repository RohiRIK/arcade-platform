services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/../logs
      - ./backend/config.json:/app/config.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped
